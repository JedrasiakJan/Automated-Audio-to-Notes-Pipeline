events {
    worker_connections 1024;
}

http {
    client_max_body_size 500M;

    server {
        listen 80;
        # Serwer odpowiada na każde żądanie (np. adres IP w sieci lokalnej lub "localhost")
        server_name _; 

        location / {
            proxy_pass http://medical-ai:8501;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # WebSocket Support (wymagane dla Streamlita!)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts - żeby nie ucięło w połowie generowania
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_connect_timeout 86400;

            # Autentykacja (Strażnik)
            auth_basic "Dostep zastrzezony dla personelu";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }
    }
}